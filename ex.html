<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOID.TXT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0b0b0f;
      --surface:   #111116;
      --text:      #d8d8e0;
      --text-muted:#8a8a9c;
      --border:    #22222a;
      --shadow:    rgba(0,0,0,0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.58;
      font-weight: 400;
      padding: 60px 20px;
      background-image:
        radial-gradient(circle at 50% 50%, #1a1a22 0%, transparent 70%);
      background-attachment: fixed;
    }

    /* very faint scanlines – almost invisible */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      );
      z-index: 9999;
    }

    .frame {
      max-width: 760px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 
        inset 0 0 80px var(--shadow),
        0 0 40px rgba(0,0,0,0.6);
      padding: 48px 40px;
      position: relative;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(3.4rem, 10vw, 6.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #f0f0f5;
      text-align: center;
      margin-bottom: 0.7em;
      line-height: 0.95;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .content {
      max-width: 640px;
      margin: 0 auto 3.5rem;
      text-align: left;
      color: var(--text);
    }

    .content p {
      margin-bottom: 1.5em;
      font-weight: 400;
    }

    .content strong {
      color: #e0e0e8;
      font-weight: 600;
    }

    .small {
      font-size: 0.94rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 5rem;
      letter-spacing: 0.04em;
    }

    .signature {
      text-align: right;
      font-size: 1.15rem;
      color: var(--text-muted);
      margin-top: 4rem;
      font-weight: 500;
    }

    @media (max-width: 520px) {
      .frame {
        padding: 36px 24px;
      }
      h1 {
        font-size: clamp(2.8rem, 9vw, 5.2rem);
      }
    }
  </style>
</head>
<body>

  <div class="frame">
    <h1>akxcco</h1>

    <div class="content">
      <p>Back again.</p>
      <p>so uhm</p>
      
      <p>I'll throw in a note or smth idk</p>
      
      <p>It's 7:32 AM Writing this</p>
      
      <p>this is under construction</p>
      
      <p><strong>pls go away.</strong></p>
      
      <p>i mean what are u doing here anyways.</p>

      <p>ill go sleep - 18/3/2026 <p>
    </div>

    <div class="signature">
      — still here
    </div>

    <div class="small">
      This is Your visit number <span id="v">0</span> • last modified never
    </div>
  </div>

  <script>
    let count = localStorage.getItem('voidTxtVisits') || 0;
    count++;
    localStorage.setItem('voidTxtVisits', count);
    document.getElementById('v').textContent = count;
  </script>

</body>
</html>
